apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: create-ephemeral-tenant-
spec:
  entrypoint: main
  arguments:
    parameters:
      - name: wandb_version
        value: "0.80.0"
      - name: name
  templates:
    - name: main
      inputs:
        parameters:
          - name: wandb_version
          - name: name
      container:
        image: alpine:3.20
        command: [sh, -c]
        args:
          - |
            echo "Creating ephemeral tenant {{inputs.parameters.name}} \
              on wandb version {{inputs.parameters.wandb_version}}"
