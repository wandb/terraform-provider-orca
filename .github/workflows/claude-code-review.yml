name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# Cancel stale reviews when a newer commit is pushed to the pull request.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Fork PRs cannot receive ANTHROPIC_API_KEY, and the action requires a
    # write-authorized actor. Skip them cleanly instead of producing a failed
    # check. Also skip bots and drafts to avoid reviewing automated or unfinished
    # work.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.type != 'Bot' &&
      !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      # Keep trusted instructions and governing rule files separate from the PR
      # checkout, where a contributor can change them.
      - name: Checkout trusted base branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: .claude-base
          fetch-depth: 1

      # GitHub expressions are not interpolated inside prompt files, so replace
      # fixed sentinels using only trusted event metadata.
      - name: Build review prompt
        id: prompt
        env:
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # The first PR that introduces this workflow has no prompt on its base
          # branch. Skip that one run; subsequent runs always use the trusted copy.
          if [[ ! -f .claude-base/.github/claude-review-prompt.md ]]; then
            echo 'available=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo 'available=true' >> "$GITHUB_OUTPUT"
          {
            echo 'value<<CLAUDE_PROMPT_EOF'
            sed -e "s#__REPO__#${REPO}#g" -e "s#__PR_NUMBER__#${PR_NUMBER}#g" \
              .claude-base/.github/claude-review-prompt.md
            echo 'CLAUDE_PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code Review
        if: steps.prompt.outputs.available == 'true'
        id: claude-review
        uses: anthropics/claude-code-action@1298632ce7736903d02a1435002705aa2a594a6c # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # The action exchanges OIDC for a GitHub App token. Override all of
          # its write defaults so the exchanged token matches this review job.
          additional_permissions: |
            contents: read
            pull_requests: write
            issues: write
          prompt: ${{ steps.prompt.outputs.value }}
          claude_args: |
            --model claude-sonnet-5
            --allowedTools "Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
